name: Build Calculator

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Download Neutralino and rcedit
        run: |
          curl -L https://github.com/neutralinojs/neutralinojs/releases/latest/download/neutralino-win_x64.exe -o Calculator-NG.exe
          curl -L https://github.com/neutralinojs/neutralinojs/releases/latest/download/WebView.dll -o WebView.dll
          curl -L https://github.com/electron/rcedit/releases/latest/download/rcedit-x64.exe -o rcedit.exe

      - name: Set file metadata
        run: |
          .\rcedit.exe Calculator-NG.exe --set-version-string "CompanyName" "Galago-labs"
          .\rcedit.exe Calculator-NG.exe --set-version-string "ProductName" "Calculator-NG"
          .\rcedit.exe Calculator-NG.exe --set-version-string "LegalCopyright" "© 2026 Galago-labs"
          .\rcedit.exe Calculator-NG.exe --set-file-version "1.0.0.0"
          .\rcedit.exe Calculator-NG.exe --set-product-version "1.0.0.0"

      - name: Package
        run: |
          mkdir output
          copy Calculator-NG.exe output\
          copy WebView.dll output\
          xcopy dist output\dist\ /E /I

      - uses: actions/upload-artifact@v4
        with:
          name: Calculator-NG-windows
          path: output/
          retention-days: 30
