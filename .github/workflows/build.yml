name: Build Calculator

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Neutralino CLI
        run: npm install -g @neutralinojs/neu

      - name: Download Neutralino binaries
        run: neu update

      - name: Build single-file app
        run: neu build --embed-resources

      - name: Set file metadata
        run: |
          dir output\
          curl -L https://github.com/electron/rcedit/releases/latest/download/rcedit-x64.exe -o rcedit.exe
          .\rcedit.exe output\Calculator-NG-win_x64.exe --set-version-string "CompanyName" "Galago-labs"
          .\rcedit.exe output\Calculator-NG-win_x64.exe --set-version-string "ProductName" "Calculator-NG"
          .\rcedit.exe output\Calculator-NG-win_x64.exe --set-version-string "LegalCopyright" "2026 Galago-labs"
          .\rcedit.exe output\Calculator-NG-win_x64.exe --set-file-version "1.0.0.0"
          .\rcedit.exe output\Calculator-NG-win_x64.exe --set-product-version "1.0.0.0"

      - uses: actions/upload-artifact@v4
        with:
          name: Calculator-NG-windows
          path: output/
          retention-days: 30
